name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/ha22yx/sat-ai-tutor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE=/api \
            --build-arg API_BASE=http://127.0.0.1:5080 \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .

      - name: Smoke test image
        run: |
          trap 'docker rm -f sat-ai-tutor-smoke >/dev/null 2>&1 || true' EXIT

          docker run -d --name sat-ai-tutor-smoke -p 3000:3000 \
            -e JWT_SECRET_KEY=smoke-jwt-secret-change-me \
            -e ROOT_ADMIN_PASSWORD=smoke-root-password \
            -e ADMIN_DEFAULT_PASSWORD=smoke-admin-password \
            -e SEED_STUDENT_PASSWORD=smoke-student-password \
            "$IMAGE:${{ github.sha }}"

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/auth/login >/dev/null; then
              docker logs sat-ai-tutor-smoke --tail 80
              exit 0
            fi
            sleep 2
          done

          docker logs sat-ai-tutor-smoke
          exit 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
